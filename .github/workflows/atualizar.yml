name: Atualizar Dados Chikungunya RIDE-DF

on:
  schedule:
    - cron: "0 0 * * 0"

  workflow_dispatch:

permissions:
  contents: write

# Impede duas atualizações do painel de rodarem simultaneamente.
concurrency:
  group: atualizar-dados-chikungunya-main
  cancel-in-progress: false

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Baixar dados de chikungunya
        run: python baixar_chikungunya.py

      - name: Filtrar dados da RIDE-DF
        run: python processar_ride.py

      - name: Commit e push
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dados/

          if git diff --cached --quiet; then
            echo "Nada mudou nesta atualização."
            exit 0
          fi

          git commit -m "Dados chikungunya RIDE-DF ($(date -u +%Y-%m-%d))"

          # Atualiza o histórico local antes de enviar o commit.
          # Faz até três tentativas caso outro commit entre durante o processo.
          for tentativa in 1 2 3; do
            echo "Tentativa de push ${tentativa}/3"

            git fetch origin main
            git rebase origin/main

            if git push origin HEAD:main; then
              echo "Dados publicados com sucesso."
              exit 0
            fi

            echo "A branch mudou durante o push. Tentando novamente..."
            sleep $((tentativa * 5))
          done

          echo "Não foi possível publicar após três tentativas."
          exit 1
