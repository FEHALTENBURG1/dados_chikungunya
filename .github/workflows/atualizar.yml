- name: Baixar do FTP do DATASUS
        run: python baixar_chikungunya.py
on:
  schedule:
    # Roda todo domingo às 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Permite rodar manualmente pelo botão no site do GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        # Atualizado de v3 para v4
        uses: actions/checkout@v4

      - name: Configurar Python
        # Atualizado de v4 para v5
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Executar script de download
        run:  pip install pandas 
          python coleta_chik.py 

      - name: Commit e Push dos dados
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ./dados_chikungunya/*
          git commit -m "Atualização semanal dos dados de Chikungunya" || echo "Sem mudanças para commit"
          git push
