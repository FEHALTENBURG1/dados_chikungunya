name: Atualizar Dados Chikungunya RIDE-DF

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: pip install pandas

      - name: Baixar do FTP do DATASUS
        run: python baixar_chikungunya.py

      - name: Filtrar RIDE-DF
        run: python processar_ride.py

      - name: Commit e push
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add dados/
          if git diff --staged --quiet; then
            echo "Nada mudou nesta semana."
          else
            git commit -m "Dados chikungunya RIDE-DF ($(date -u +%Y-%m-%d))"
            git push
          fi
