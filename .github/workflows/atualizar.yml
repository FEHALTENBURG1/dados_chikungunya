name: Baixar Dados Chikungunya

on:
  schedule:
    - cron: '0 0 * * 0'      # domingo, 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write            # sem isso o git push dá 403

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install pandas

      - name: Baixar do FTP do DATASUS
        run: python baixar_chikungunya.py

      # Enquanto o processar_ride.py não existe, o bruto NÃO vai pro Git.
      # O step abaixo só confirma o que foi baixado.
      - name: Conferir download
        run: ls -lh bruto/
