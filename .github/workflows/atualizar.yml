name: Baixar Dados Chikungunya

on:
  schedule:
    # Roda todo domingo às 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Permite rodar manualmente pelo botão no site do GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Executar script de download
        run: |
          # Se o seu script precisar de alguma lib extra, instale aqui
          # pip install pandas 
          python seu_script.py # Substitua pelo nome do seu arquivo Python

      - name: Commit e Push dos dados
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ./dados_chikungunya/*
          git commit -m "Atualização semanal dos dados de Chikungunya" || echo "Sem mudanças para commit"
          git push
